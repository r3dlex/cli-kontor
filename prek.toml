# prek.toml — pre-commit hook configuration for kontor-cli
# See https://prek.j178.dev/ for documentation.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
  { id = "check-yaml", pass_filenames = false },
  { id = "check-json", pass_filenames = false },
  { id = "check-toml", pass_filenames = false },
  { id = "check-merge-conflict", pass_filenames = false },
  { id = "end-of-file-fixer", pass_filenames = false },
  { id = "trailing-whitespace", pass_filenames = false },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.6.0"
hooks = [
  { id = "ruff", args = ["--fix"], pass_filenames = false },
  { id = "ruff-format", pass_filenames = false },
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-mypy"
rev = "v1.11.0"
hooks = [
  # pass_filenames = false so we control the target list; we point mypy at
  # the actual package directory and the rules subpackage so it picks up the
  # sources in this repo. Without args, mypy exits with
  # "Missing target module, package, files, or command".
  # click must be installed in the hook venv: under strict mypy an absent
  # click resolves to Any and every CLI decorator trips
  # disallow_untyped_decorators.
  { id = "mypy", pass_filenames = false, args = ["src/kontor_cli", "rules"], additional_dependencies = ["click", "types-PyYAML", "types-python-dateutil"] },
]
